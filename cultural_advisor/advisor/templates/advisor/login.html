{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Cultural Advisor</title>
    <!-- Sunflower Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sunflower:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'advisor/css/style.css' %}">
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card slide-up">
            <h2>AI Etiquette</h2>
            <p style="margin-bottom: 30px; opacity: 0.7; font-weight: 500;">Welcome back! Please login to continue.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <input type="text" name="username" id="username" placeholder=" " required>
                    <label for="username">Username</label>
                </div>
                <div class="form-group">
                    <input type="password" name="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>
                
                {% if form.errors %}
                <p style="color: var(--highlight); font-size: 0.85rem; margin-bottom: 15px; font-weight: 600;">Invalid username or password.</p>
                {% endif %}
                
                <button type="submit" class="auth-btn">Login to Account</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
